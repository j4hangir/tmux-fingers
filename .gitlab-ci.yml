stages:
  - test
  - build
  - release

test:
  stage: test
  image: crystallang/crystal:1.14
  script:
    - shards install
    - crystal spec

build:
  stage: build
  image: crystallang/crystal:1.14
  script:
    - shards install
    - crystal build src/fingers.cr -o tmux-fingers --release --static
  artifacts:
    paths:
      - tmux-fingers

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: [build]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Releasing $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "tmux-fingers $CI_COMMIT_TAG"
    assets:
      links:
        - name: tmux-fingers-linux-amd64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/tmux-fingers?job=build"
